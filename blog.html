<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Kaagaaz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- MarkedJS Parser: Converts raw Markdown from GitHub Issues into clean HTML on your site -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="blog-layout">

    <!-- Theme Switcher -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="blog-container">
        <!-- Back Button -->
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> back home</a>

        <header class="blog-header">
            <h1>My Logs</h1>
            <p>Sharing my projects, thoughts, and lo-fi updates.</p>
        </header>

        <!-- Blog Posts will load dynamically here -->
        <div id="blog-posts-container">
            <p class="no-posts">Booting up the logs...</p>
        </div>
    </div>

    <!-- Script to Fetch your GitHub Issues as Blog Posts -->
    <script>
        // Adjust these to match your account
        const GITHUB_USERNAME = "Kaagaaz";
        const REPO_NAME = "Kaagaaz.github.io";
        
        async function loadBlogPosts() {
            const container = document.getElementById('blog-posts-container');
            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?labels=blog&state=open`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to load");
                const issues = await response.json();

                if (issues.length === 0) {
                    container.innerHTML = `<p class="no-posts">No updates posted yet. Come back soon!</p>`;
                    return;
                }

                container.innerHTML = ''; // Clear loading screen

                issues.forEach(issue => {
                    const postCard = document.createElement('article');
                    postCard.className = 'blog-post';

                    const date = new Date(issue.created_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    // Parse the Markdown content of the issue into safe HTML
                    const parsedBody = marked.parse(issue.body || "No text content.");

                    postCard.innerHTML = `
                        <h2 class="post-title">${issue.title}</h2>
                        <p class="post-date">Logged on ${date}</p>
                        <div class="post-body">${parsedBody}</div>
                    `;
                    container.appendChild(postCard);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="no-posts">Oops! Failed to connect to the digital archive. Try reloading.</p>`;
            }
        }

        loadBlogPosts();
    </script>
    <script src="script.js"></script>
</body>
</html>
