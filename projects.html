<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Kaagaaz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- MarkedJS Parser: Converts raw Markdown/Code into clean HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="projects-layout">
    <script>
    // Instantly apply dark mode class before the rest of the page renders to prevent flickering
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
    </script>
    

    <!-- Theme Switcher -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="blog-container" style="max-width: 900px;" id="main-wrapper">
        <!-- Navigation Link Area -->
        <div id="project-nav">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> back home</a>
        </div>

        <header class="blog-header" id="project-header-area">
            <h1>My Creations</h1>
            <p>Apps, tools, and tech concepts I build.</p>
        </header>

        <!-- Dynamic Grid/Single content injection target -->
        <div id="projects-grid-container" class="projects-grid">
            <p class="no-posts">Loading the project boards...</p>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = "Kaagaaz";
        const REPO_NAME = "Kaagaaz.github.io";
        
        // Checks if a specific project ID is requested in the URL parameter (e.g., projects.html?project=4)
        const urlParams = new URLSearchParams(window.location.search);
        const currentProjectId = urlParams.get('project');

        async function initProjects() {
            if (currentProjectId) {
                // If a project ID is present, render ONLY that full project sheet
                await loadSingleProject(currentProjectId);
            } else {
                // Otherwise, show the clean, organized list of card previews
                await loadProjectsList();
            }
        }

        // Cleans up code snippets and text strings to prevent grid card blowouts
        function createSnippet(markdownText) {
            if (!markdownText) return "No description available.";
            
            let cleanText = markdownText
                .replace(/<!--[\s\S]*?-->/g, '')  /* Strips out raw HTML comments */
                .replace(/<[^>]*>/g, '')          /* Strips out stray HTML tags */
                .replace(/!\[.*?\]\(.*?\)/g, '') /* Filters out markdown image assets */
                .replace(/\[.*?\]\(.*?\)/g, '')  /* Filters out hyperlinks */
                .replace(/`{3}[\s\S]*?`{3}/g, '') /* Filters out code blocks completely */
                .replace(/`.*?`/g, '')            /* Filters out inline snippets */
                .replace(/[#*_-]/g, '')           /* Cleans up remaining structural markdown */
                .trim();
            
            if (cleanText.length > 120) {
                return cleanText.substring(0, 120) + "...";
            }
            return cleanText || "View project details for comprehensive documentation.";
        }

                async function loadProjectsList() {
            const container = document.getElementById('projects-grid-container');
            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?labels=project&state=open`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Could not load grid");
                const issues = await response.json();

                if (issues.length === 0) {
                    container.removeAttribute('class'); // Drops grid framework alignment if empty
                    container.innerHTML = `<p class="no-posts">No projects showcased yet. Check back soon!</p>`;
                    return;
                }

                container.innerHTML = ''; 

                issues.forEach(issue => {
                    const projectCard = document.createElement('div');
                    projectCard.className = 'project-card';

                    const snippet = createSnippet(issue.body);

                    // Gacha-stylized project card layout
                    projectCard.innerHTML = `
                        <div style="display: flex; flex-direction: column; height: 100%; justify-content: space-between; position: relative;">
                            <!-- Small Technical Top-Bar -->
                            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; font-family: 'JetBrains Mono', monospace;">
                                <span>[ SYSTEM_FILE: PROJ_${issue.number} ]</span>
                                <span class="gacha-stars">✦ ✦ ✦ ✦ ✦</span>
                    
                            </div>
                            <div>
                                <h2>${issue.title}</h2>
                                <p class="project-card-body" style="margin-bottom: 20px; opacity: 0.8; font-size: 0.9rem;">${snippet}</p>
                            </div>
                            <a href="?project=${issue.number}" class="btn" style="font-size: 0.85rem; padding: 7px 18px; text-align: center; align-self: flex-start;">ACCESS DATA →</a>
                        </div>
                    `;
                    container.appendChild(projectCard);
                });

            } catch (error) {
                console.error(error);
                container.removeAttribute('class');
                container.innerHTML = `<p class="no-posts">Oops! Failed to connect to the creations grid.</p>`;
            }
                }
        

        async function loadSingleProject(id) {
            const container = document.getElementById('projects-grid-container');
            const nav = document.getElementById('project-nav');
            const headerArea = document.getElementById('project-header-area');
            const wrapper = document.getElementById('main-wrapper');
            
            // Alter alignment attributes for full-immersion text mode reading
            container.removeAttribute('class'); 
            wrapper.style.maxWidth = "750px"; 
            
            // Reconfigure navigation headers dynamically
            nav.innerHTML = `<a href="projects.html" class="back-btn"><i class="fas fa-arrow-left"></i> back to all projects</a>`;
            headerArea.style.display = 'none';

            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues/${id}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Entry missing");
                const issue = await response.json();

                container.innerHTML = ''; 

                const projectDetails = document.createElement('article');
                projectDetails.className = 'full-post-view';
                
            
                
                // Strips layout cards for a clean full view interface
                projectDetails.style.background = 'none';
                projectDetails.style.border = 'none';
                projectDetails.style.boxShadow = 'none';
                projectDetails.style.padding = '0';

                const parsedContent = marked.parse(issue.body || "No documentation supplied.");

                projectDetails.innerHTML = `
                    <h1 class="post-title" style="font-size: 2.3rem; margin-bottom: 30px;">${issue.title}</h1>
                    <div class="post-body">${parsedContent}</div>
                `;
                container.appendChild(projectDetails);

            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="no-posts">Oops! This project detail could not be loaded. <a href="projects.html" style="color: var(--accent-color);">Return to projects grid</a></p>`;
            }
        }

        initProjects();
    </script>
    <script src="script.js"></script>
</body>
</html>
